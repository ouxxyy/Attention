<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AttentionBudget 设置</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #1a1a2e;
        color: #eaeaea;
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
      }

      .header p {
        font-size: 14px;
        color: #888;
        margin-top: 8px;
      }

      .section {
        background: #252542;
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
      }

      .section-title {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid #3d3d54;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group:last-child {
        margin-bottom: 0;
      }

      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #ccc;
        margin-bottom: 8px;
      }

      .form-hint {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }

      .form-input {
        width: 100%;
        padding: 12px 16px;
        background: #1a1a2e;
        border: 1px solid #3d3d54;
        border-radius: 8px;
        font-size: 14px;
        color: #fff;
        transition: all 0.2s ease;
      }

      .form-input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      .form-input::placeholder {
        color: #666;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .toggle-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .toggle {
        position: relative;
        width: 48px;
        height: 26px;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #3d3d54;
        border-radius: 26px;
        transition: 0.3s;
      }

      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 3px;
        background-color: #fff;
        border-radius: 50%;
        transition: 0.3s;
      }

      .toggle input:checked + .toggle-slider {
        background-color: #6366f1;
      }

      .toggle input:checked + .toggle-slider:before {
        transform: translateX(22px);
      }

      .website-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .website-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: #1a1a2e;
        border-radius: 20px;
        font-size: 13px;
        color: #ccc;
      }

      .website-tag button {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        padding: 0;
        font-size: 16px;
        line-height: 1;
      }

      .website-tag button:hover {
        color: #f44336;
      }

      .add-website {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .add-website input {
        flex: 1;
      }

      .add-website button {
        padding: 12px 20px;
        background: #6366f1;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .add-website button:hover {
        background: #4f46e5;
      }

      .save-btn {
        display: block;
        width: 100%;
        padding: 14px;
        background: #6366f1;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .save-btn:hover {
        background: #4f46e5;
      }

      .save-btn.success {
        background: #4caf50;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>AttentionBudget 设置</h1>
        <p>自定义你的注意力管理偏好</p>
      </div>

      <div class="section">
        <h2 class="section-title">预算设置</h2>

        <div class="form-group">
          <label class="form-label">每日注意力预算 (分钟)</label>
          <input
            type="number"
            class="form-input"
            id="dailyBudget"
            min="60"
            max="960"
            value="480"
          />
          <p class="form-hint">
            默认 480 分钟 (8 小时)，建议根据实际工作时长调整
          </p>
        </div>

        <div class="form-group">
          <label class="form-label">每次切换成本 (分钟)</label>
          <input
            type="number"
            class="form-input"
            id="switchCost"
            min="5"
            max="60"
            value="23"
          />
          <p class="form-hint">研究表明每次任务切换需要约 23 分钟恢复专注</p>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">干预设置</h2>

        <div class="form-group">
          <div class="toggle-group">
            <div>
              <label class="form-label" style="margin-bottom: 0"
                >启用干预弹窗</label
              >
              <p class="form-hint" style="margin-top: 4px">
                访问分心网站前显示提醒
              </p>
            </div>
            <label class="toggle">
              <input type="checkbox" id="interventionEnabled" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">干预模式</label>
          <select class="form-input" id="interventionMode">
            <option value="all">所有时段</option>
            <option value="focus-time-only">仅专注时段</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">专注时段开始</label>
            <input
              type="time"
              class="form-input"
              id="focusTimeStart"
              value="09:00"
            />
          </div>
          <div class="form-group">
            <label class="form-label">专注时段结束</label>
            <input
              type="time"
              class="form-input"
              id="focusTimeEnd"
              value="12:00"
            />
          </div>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">分心网站</h2>

        <p class="form-hint">以下网站将触发干预提醒</p>

        <div class="website-list" id="websiteList"></div>

        <div class="add-website">
          <input
            type="text"
            class="form-input"
            id="newWebsite"
            placeholder="输入域名，如 twitter.com"
          />
          <button id="addWebsiteBtn">添加</button>
        </div>
      </div>

      <button class="save-btn" id="saveBtn">保存设置</button>
    </div>

    <script src="options.ts" type="module"></script>
  </body>
</html>
