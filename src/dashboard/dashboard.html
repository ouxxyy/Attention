<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AttentionBudget - 注意力报告</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #0f0f1a;
        color: #eaeaea;
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
      }

      .header-actions {
        display: flex;
        gap: 12px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background: #6366f1;
        color: #fff;
      }

      .btn-primary:hover {
        background: #4f46e5;
      }

      .btn-secondary {
        background: #252542;
        color: #aaa;
      }

      .btn-secondary:hover {
        background: #3d3d54;
        color: #fff;
      }

      .stats-overview {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: #1a1a2e;
        border-radius: 16px;
        padding: 24px;
      }

      .stat-card .label {
        font-size: 14px;
        color: #888;
        margin-bottom: 8px;
      }

      .stat-card .value {
        font-size: 36px;
        font-weight: 700;
        color: #fff;
      }

      .stat-card .change {
        font-size: 12px;
        margin-top: 8px;
      }

      .stat-card .change.positive {
        color: #4caf50;
      }

      .stat-card .change.negative {
        color: #f44336;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }

      .card {
        background: #1a1a2e;
        border-radius: 16px;
        padding: 24px;
      }

      .card-title {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 20px;
      }

      .chart-container {
        height: 300px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        padding: 20px 0;
      }

      .chart-bar {
        width: 30px;
        background: linear-gradient(180deg, #6366f1, #4f46e5);
        border-radius: 4px 4px 0 0;
        position: relative;
        transition: height 0.3s ease;
      }

      .chart-bar:hover {
        background: linear-gradient(180deg, #818cf8, #6366f1);
      }

      .chart-bar-label {
        position: absolute;
        bottom: -24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: #888;
      }

      .website-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .website-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: #252542;
        border-radius: 8px;
      }

      .website-item .rank {
        width: 24px;
        height: 24px;
        background: #6366f1;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
      }

      .website-item .domain {
        flex: 1;
        font-size: 14px;
        color: #fff;
      }

      .website-item .duration {
        font-size: 14px;
        color: #888;
      }

      .website-item .bar {
        width: 80px;
        height: 6px;
        background: #3d3d54;
        border-radius: 3px;
        overflow: hidden;
      }

      .website-item .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #818cf8);
        border-radius: 3px;
      }

      .focus-sessions {
        margin-top: 20px;
      }

      .session-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid #252542;
      }

      .session-item:last-child {
        border-bottom: none;
      }

      .session-time {
        font-size: 13px;
        color: #888;
        min-width: 100px;
      }

      .session-duration {
        font-size: 14px;
        color: #fff;
      }

      .session-badge {
        padding: 4px 8px;
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
        border-radius: 12px;
        font-size: 11px;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #888;
      }

      @media (max-width: 768px) {
        .stats-overview {
          grid-template-columns: repeat(2, 1fr);
        }

        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>注意力报告</h1>
        <div class="header-actions">
          <button class="btn btn-secondary" id="exportBtn">导出数据</button>
          <button class="btn btn-primary" id="settingsBtn">设置</button>
        </div>
      </div>

      <div class="stats-overview">
        <div class="stat-card">
          <div class="label">注意力分数</div>
          <div class="value" id="scoreValue">--</div>
          <div class="change positive" id="scoreChange">--</div>
        </div>
        <div class="stat-card">
          <div class="label">剩余预算</div>
          <div class="value" id="budgetValue">--</div>
          <div class="change" id="budgetPercent">--</div>
        </div>
        <div class="stat-card">
          <div class="label">今日切换</div>
          <div class="value" id="switchValue">--</div>
          <div class="change negative" id="switchChange">--</div>
        </div>
        <div class="stat-card">
          <div class="label">专注会话</div>
          <div class="value" id="focusValue">--</div>
          <div class="change positive" id="focusChange">--</div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card">
          <h2 class="card-title">今日注意力趋势</h2>
          <div class="chart-container" id="hourlyChart">
            <!-- 动态生成 -->
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">注意力黑洞 Top 5</h2>
          <div class="website-list" id="websiteList">
            <div class="empty-state">暂无数据</div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top: 20px">
        <h2 class="card-title">今日专注会话</h2>
        <div class="focus-sessions" id="focusSessions">
          <div class="empty-state">暂无专注会话记录</div>
        </div>
      </div>
    </div>

    <script src="dashboard.ts" type="module"></script>
  </body>
</html>
